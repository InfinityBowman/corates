name: CI - Deploy & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------
# Prerequisites (one-time setup):
#
# 1. Cloudflare resources:
#    wrangler d1 create corates-db-staging
#    wrangler r2 bucket create corates-pdfs-staging
#    wrangler queues create corates-emails-staging
#    wrangler queues create corates-emails-staging-dlq
#
# 2. Update database_id in packages/web/wrangler.jsonc and
#    packages/stripe-purchases/wrangler.jsonc staging envs
#    with the ID from step 1.
#
# 3. DNS: Add CNAME record for staging.corates.org
#    pointing to your workers custom domain.
#
# 4. Wrangler secrets for staging (run from packages/web):
#    wrangler secret put AUTH_SECRET --env staging
#    wrangler secret put STRIPE_SECRET_KEY --env staging
#    wrangler secret put STRIPE_WEBHOOK_SECRET_AUTH --env staging
#    wrangler secret put STRIPE_WEBHOOK_SECRET_PURCHASES --env staging
#    wrangler secret put GOOGLE_CLIENT_SECRET --env staging
#    wrangler secret put ORCID_CLIENT_SECRET --env staging
#    wrangler secret put POSTMARK_SERVER_TOKEN --env staging
#    wrangler secret put ADMIN_EMAIL --env staging
#    wrangler secret put GOOGLE_CLIENT_ID --env staging
#    wrangler secret put ORCID_CLIENT_ID --env staging
#    wrangler secret put EMAIL_FROM --env staging
#
#    And for stripe-purchases (run from packages/stripe-purchases):
#    wrangler secret put STRIPE_SECRET_KEY --env staging
#    wrangler secret put STRIPE_WEBHOOK_SECRET_PURCHASES --env staging
#
# 5. GitHub repository secrets:
#    CLOUDFLARE_API_TOKEN  - API token with Workers + D1 + R2 permissions
#
# 6. GitHub repository variables (Settings > Variables):
#    VITE_GOOGLE_PICKER_API_KEY
#    VITE_GOOGLE_PICKER_APP_ID
#    VITE_SENTRY_DSN           (production client-side Sentry DSN)
# ---------------------------------------------------------------

jobs:
  checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @corates/shared --filter @corates/db build

      - name: Generate test migration SQL
        run: pnpm --filter workers db:generate:test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

  # Build and deploy to staging. Gated on `checks` and push-only; this gate
  # cascades to `e2e` and `deploy-production` via `needs` (a skipped dependency
  # skips its dependents), so the whole deploy chain stays off pull requests.
  deploy-staging:
    if: github.event_name == 'push'
    needs: checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      # Resolved Playwright version, consumed by the e2e job's container tag so
      # the image can never drift out of sync with @playwright/test.
      playwright-version: ${{ steps.pw-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw-version
        run: echo "version=$(pnpm --filter web exec playwright --version | cut -d' ' -f2)" >> "$GITHUB_OUTPUT"

      - name: Build workspace dependencies
        run: pnpm --filter @corates/shared --filter @corates/db build

      - name: Build web for staging
        env:
          CLOUDFLARE_ENV: staging
          VITE_API_URL: 'https://staging.corates.org'
          VITE_PUBLIC_APP_URL: 'https://staging.corates.org'
          VITE_BASEPATH: '/'
          VITE_DEV_PANEL: 'false'
          VITE_GOOGLE_PICKER_API_KEY: ${{ vars.VITE_GOOGLE_PICKER_API_KEY }}
          VITE_GOOGLE_PICKER_APP_ID: ${{ vars.VITE_GOOGLE_PICKER_APP_ID }}
        run: pnpm --filter web build

      - name: Migrate staging database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2ab59c3eb44887bfa2bac00afd32290a
        run: pnpm --filter web db:migrate:staging

      - name: Deploy web to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: packages/web
        run: pnpm exec wrangler deploy

      - name: Deploy stripe-purchases to staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: packages/stripe-purchases
        run: pnpm exec wrangler deploy --env staging

      # Confirm the deploy is live before handing off to the e2e job. Runs here
      # (not in the e2e container) so we can rely on curl being present.
      - name: Wait for staging to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf https://staging.corates.org/api/test/health > /dev/null 2>&1; then
              echo "Staging is ready"
              exit 0
            fi
            echo "Waiting for staging... (attempt $i/30)"
            sleep 5
          done
          echo "Staging did not become ready in time"
          exit 1

  # E2E against staging in the official Playwright container: browsers and their
  # system deps are prebaked, so there is no install step. The image tag is
  # derived from the version deploy-staging resolved, so it always matches
  # @playwright/test and cannot drift.
  e2e:
    needs: deploy-staging
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.deploy-staging.outputs.playwright-version }}-noble
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Playwright image ships no C toolchain, so native modules
      # (better-sqlite3) hard-fail when their prebuilt-binary download flakes
      # and prebuild-install falls back to compiling from source.
      - name: Install native build tools
        run: apt-get update && apt-get install -y --no-install-recommends make g++

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run e2e tests
        env:
          PLAYWRIGHT_BASE_URL: 'https://staging.corates.org'
        working-directory: packages/web
        run: pnpm test:e2e

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/web/test-results/
          retention-days: 7

  # Production deploy, gated on e2e passing (default success() on `needs`).
  deploy-production:
    needs: e2e
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace dependencies
        run: pnpm --filter @corates/shared --filter @corates/db build

      - name: Build web for production
        env:
          CLOUDFLARE_ENV: production
          VITE_API_URL: 'https://corates.org'
          VITE_PUBLIC_APP_URL: 'https://corates.org'
          VITE_BASEPATH: '/'
          VITE_DEV_PANEL: 'false'
          VITE_GOOGLE_PICKER_API_KEY: ${{ vars.VITE_GOOGLE_PICKER_API_KEY }}
          VITE_GOOGLE_PICKER_APP_ID: ${{ vars.VITE_GOOGLE_PICKER_APP_ID }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm --filter web build

      - name: Migrate production database
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 2ab59c3eb44887bfa2bac00afd32290a
        run: pnpm --filter web db:migrate:prod

      - name: Deploy web to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: packages/web
        run: pnpm exec wrangler deploy

      - name: Deploy stripe-purchases to production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        working-directory: packages/stripe-purchases
        run: pnpm exec wrangler deploy --env production
